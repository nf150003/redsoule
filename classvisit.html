<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Audit Visit System</title>

<style>
body{
    font-family:"Segoe UI", sans-serif;
    background:#f3f6fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:950px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
    text-align:center;
    border-bottom:3px solid #2563eb;
    padding-bottom:10px;
}

.header h2{
    margin:0;
    color:#2563eb;
}

.section{
    margin-top:18px;
    padding:15px;
    background:#fafafa;
    border:1px solid #e5e7eb;
    border-radius:10px;
}

.section-title{
    font-weight:700;
    margin-bottom:10px;
    color:#111827;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

label{
    font-weight:600;
    display:block;
    margin-top:10px;
    font-size:14px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

.checklist{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.checkitem{
    background:white;
    padding:8px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    color:white;
}

.save{
    background:#0ea5e9;
}

.save:hover{
    background:#0284c7;
}

.print{
    background:#16a34a;
}

.print:hover{
    background:#15803d;
}

.generate{
    background:#2563eb;
}

.generate:hover{
    background:#1e40af;
}

.output{
    margin-top:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Class Audit Visit System</h2>
<p>Professional Teaching Evaluation Tool</p>
</div>

<!-- BASIC INFO -->
<div class="section">
<div class="section-title">Audit Information</div>

<div class="grid">

<div>
<label>Visiting Teacher (Auditor)</label>
<select id="auditor">
<option>Select Auditor</option>
<option>Sajib Mahmud</option>
<option>Mukit Hossain</option>
<option>Md. Faiyaz Alam</option>
<option>Md. Mahbub Hasan</option>
<option>Md. Imrul Kaes</option>
<option>Rumana Yasmin</option>
<option>Kibrya Ahmed</option>
<option>Subrata Mitra</option>
<option>Md. Nazrul Islam</option>
<option>Md. Shahinur Islam</option>
</select>
</div>

<div>
<label>Teacher Observed</label>
<select id="teacher">
<option>Select Teacher</option>
<option>Sajib Mahmud</option>
<option>Mukit Hossain</option>
<option>Md. Faiyaz Alam</option>
<option>Md. Mahbub Hasan</option>
<option>Md. Imrul Kaes</option>
<option>Rumana Yasmin</option>
<option>Kibrya Ahmed</option>
<option>Md. Shohel Rana</option>
<option>Md. Imran Ali Khan</option>
</select>
</div>

</div>

<label>Class / Room</label>
<input type="text" id="room">

<label>Subject</label>
<input type="text" id="subject">

<label>Date</label>
<input type="date" id="date">
</div>

<!-- CHECKLIST -->
<div class="section">
<div class="section-title">Audit Checklist</div>

<div class="checklist">
<label class="checkitem"><input type="checkbox" id="c1"> Lesson well prepared</label>
<label class="checkitem"><input type="checkbox" id="c2"> Clear explanation</label>
<label class="checkitem"><input type="checkbox" id="c3"> Classroom control</label>
<label class="checkitem"><input type="checkbox" id="c4"> Student engagement</label>
<label class="checkitem"><input type="checkbox" id="c5"> Teaching aids used</label>
<label class="checkitem"><input type="checkbox" id="c6"> Interactive class</label>
<label class="checkitem"><input type="checkbox" id="c7"> Time management</label>
<label class="checkitem"><input type="checkbox" id="c8"> Evaluation done</label>
</div>
</div>

<!-- FINAL COMMENT -->
<div class="section">
<div class="section-title">Final Remarks</div>
<input type="text" id="final" placeholder="Write final comment here...">
</div>

<!-- BUTTONS -->
<button class="generate" onclick="generate()">Generate Report</button>
<button class="print" onclick="window.print()">Print / Save PDF</button>
<button class="save" onclick="saveToSheet()">Save to Google Sheet</button>

<!-- OUTPUT -->
<div id="output" class="output"></div>

</div>

<script>

function getChecklist(){
    let items = [];
    for(let i=1;i<=8;i++){
        let cb = document.getElementById("c"+i);
        if(cb.checked){
            items.push(cb.parentNode.innerText.trim());
        }
    }
    return items.join(", ");
}

function generate(){
    document.getElementById("output").innerHTML = `
    <h3>Class Audit Report</h3>
    <hr>
    <p><b>Auditor:</b> ${auditor.value}</p>
    <p><b>Teacher:</b> ${teacher.value}</p>
    <p><b>Class:</b> ${room.value}</p>
    <p><b>Subject:</b> ${subject.value}</p>
    <p><b>Date:</b> ${date.value}</p>
    <hr>
    <p><b>Checklist:</b> ${getChecklist()}</p>
    <hr>
    <p><b>Final Comment:</b> ${final.value}</p>
    `;
}

/* 🔥 GOOGLE SHEET SAVE */
function saveToSheet(){

    let data = {
        auditor: auditor.value,
        teacher: teacher.value,
        room: room.value,
        subject: subject.value,
        date: date.value,
        checklist: getChecklist(),
        comment: final.value
    };

    fetch("https://script.google.com/macros/s/AKfycbw1sJatw_bBylJMfsLuUGNrFmAMbFBJAvgPLynNdDGpGVpzMhhfTXkzJViIHr_ed88/exec", {
        method: "POST",
        mode: "no-cors",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    alert("Saved to Google Sheet ✅");
}

</script>

</body>
</html>
