<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Audit Visit System</title>

<style>
body{
    font-family:"Segoe UI", sans-serif;
    background:#f7f8fc;
    margin:0;
    padding:20px;
    color:#333;
}

.container{
    max-width:950px;
    margin:auto;
    background:#ffffff;
    padding:25px;
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

/* HEADER */
.header{
    text-align:center;
    border-bottom:2px solid #d6dbe8;
    padding-bottom:10px;
}

.header h2{
    margin:0;
    color:#4a5568;
    font-weight:600;
}

.header p{
    margin:5px;
    color:#718096;
    font-size:13px;
}

/* SECTION */
.section{
    margin-top:18px;
    padding:15px;
    background:#f9fafc;
    border:1px solid #e6e9f2;
    border-radius:10px;
}

.section-title{
    font-weight:600;
    margin-bottom:10px;
    color:#4a5568;
}

/* INPUTS */
label{
    font-weight:600;
    font-size:13px;
    margin-top:10px;
    display:block;
    color:#555;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #d6dbe8;
    background:#fff;
    font-size:14px;
    outline:none;
}

input:focus, select:focus{
    border-color:#a3bffa;
    box-shadow:0 0 0 3px rgba(163,191,250,0.3);
}

/* CHECKBOX */
.checklist{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.checkitem{
    background:#ffffff;
    padding:8px;
    border-radius:8px;
    border:1px solid #e6e9f2;
    font-size:13px;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    color:white;
    transition:0.2s;
}

.generate{
    background:#a3bffa;
    color:#1a202c;
}

.generate:hover{
    background:#8daaf0;
}

.save{
    background:#b7c4ff;
    color:#1a202c;
}

.save:hover{
    background:#9fb2ff;
}

.print{
    background:#cbd5e0;
    color:#1a202c;
}

.print:hover{
    background:#a0aec0;
}

/* OUTPUT */
.output{
    margin-top:20px;
    padding:15px;
    border:1px solid #e6e9f2;
    border-radius:10px;
    background:#ffffff;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Class Audit Visit System</h2>
<p>Soft Professional Evaluation Interface</p>
</div>

<!-- BASIC INFO -->
<div class="section">
<div class="section-title">Audit Information</div>

<label>Visiting Teacher</label>
<select id="auditor">
<option>Select Auditor</option>
<option>Sajib Mahmud</option>
<option>Mukit Hossain</option>
<option>Md. Faiyaz Alam</option>
<option>Md. Mahbub Hasan</option>
<option>Md. Imrul Kaes</option>
<option>Rumana Yasmin</option>
</select>

<label>Teacher Observed</label>
<select id="teacher">
<option>Select Teacher</option>
<option>Sajib Mahmud</option>
<option>Mukit Hossain</option>
<option>Md. Faiyaz Alam</option>
<option>Md. Mahbub Hasan</option>
<option>Md. Imrul Kaes</option>
<option>Rumana Yasmin</option>
</select>

<label>Class / Room</label>
<input type="text" id="room">

<label>Subject</label>
<input type="text" id="subject">

<label>Date</label>
<input type="date" id="date">
</div>

<!-- CHECKLIST -->
<div class="section">
<div class="section-title">Audit Checklist</div>

<div class="checklist">
<label class="checkitem"><input type="checkbox" id="c1"> Lesson prepared</label>
<label class="checkitem"><input type="checkbox" id="c2"> Clear explanation</label>
<label class="checkitem"><input type="checkbox" id="c3"> Classroom control</label>
<label class="checkitem"><input type="checkbox" id="c4"> Student engagement</label>
<label class="checkitem"><input type="checkbox" id="c5"> Teaching aids used</label>
<label class="checkitem"><input type="checkbox" id="c6"> Interactive learning</label>
<label class="checkitem"><input type="checkbox" id="c7"> Time managed well</label>
<label class="checkitem"><input type="checkbox" id="c8"> Evaluation done</label>
</div>
</div>

<!-- FINAL -->
<div class="section">
<div class="section-title">Final Comment</div>
<input type="text" id="final" placeholder="Write final observation...">
</div>

<!-- BUTTONS -->
<button class="generate" onclick="generate()">Generate Report</button>
<button class="print" onclick="window.print()">Print / PDF</button>
<button class="save" onclick="saveToSheet()">Save to Google Sheet</button>

<div id="output" class="output"></div>

</div>

<script>

function getChecklist(){
    let items = [];
    for(let i=1;i<=8;i++){
        let cb = document.getElementById("c"+i);
        if(cb.checked){
            items.push(cb.parentNode.innerText.trim());
        }
    }
    return items.join(", ");
}

function generate(){
    document.getElementById("output").innerHTML = `
    <h3>Audit Report</h3>
    <hr>
    <p><b>Auditor:</b> ${auditor.value}</p>
    <p><b>Teacher:</b> ${teacher.value}</p>
    <p><b>Class:</b> ${room.value}</p>
    <p><b>Subject:</b> ${subject.value}</p>
    <p><b>Date:</b> ${date.value}</p>
    <hr>
    <p><b>Checklist:</b> ${getChecklist()}</p>
    <hr>
    <p><b>Final Comment:</b> ${final.value}</p>
    `;
}

/* GOOGLE SHEET SAVE */
function saveToSheet(){

    let data = new URLSearchParams();

    data.append("auditor", auditor.value);
    data.append("teacher", teacher.value);
    data.append("room", room.value);
    data.append("subject", subject.value);
    data.append("date", date.value);
    data.append("checklist", getChecklist());
    data.append("comment", final.value);

    fetch("https://script.google.com/macros/s/AKfycbw1sJatw_bBylJMfsLuUGNrFmAMbFBJAvgPLynNdDGpGVpzMhhfTXkzJViIHr_ed88/exec", {
        method: "POST",
        body: data
    });

    alert("Saved successfully ✅");
}

</script>

</body>
</html>
