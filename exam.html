<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Exam Flow Chart</title><style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7f9fc;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#2b2d42;
}

.container{
  width:100%;
  max-width:520px;
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  text-align:center;
  font-size:22px;
  margin-bottom:15px;
}

.box{
  padding:16px;
  margin:10px 0;
  border-radius:15px;
  font-weight:bold;
  text-align:center;
  color:#2b2d42;
  position:relative;
  animation:slideIn 0.6s ease forwards;
  opacity:0;
}

@keyframes slideIn{
  from{opacity:0; transform:translateX(-20px);}
  to{opacity:1; transform:translateX(0);}
}

/* Soft colored arrows */
.arrow{
  text-align:center;
  font-size:28px;
  animation:bounce 1.2s infinite;
  color:#a8dadc;
  text-shadow:0 1px 2px rgba(0,0,0,0.1);
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(5px);}
}

.start{background:#a8dadc;}
.routine{background:#bde0fe;}
.registration{background:#cdb4db;}
.exam{background:#ffe5b4;}
.evaluation{background:#ffafcc;}
.result{background:#bde0fe;}
.promotion{background:#a8dadc;}

.date{
  display:block;
  font-size:12px;
  margin-top:5px;
  opacity:0.8;
  font-weight:normal;
}

.disabled{
  opacity:0.3;
  filter: grayscale(100%);
  pointer-events:none;
  transform:scale(0.98);
}
</style></head><body><div class="container"><h1>📘 School Exam Flow Chart</h1><div class="box start" data-date="2026-05-01">
Start Session
<span class="date">01 May 2026</span>
</div>
<div class="arrow">⬇</div><div class="box routine" data-date="2026-05-05">
Routine Publish
<span class="date">05 May 2026</span>
</div>
<div class="arrow">⬇</div><div class="box registration" data-date="2026-05-10">
Registration
<span class="date">10 May 2026</span>
</div>
<div class="arrow">⬇</div><div class="box exam" data-date="2026-05-15">
Exam
<span class="date">15 May 2026</span>
</div>
<div class="arrow">⬇</div><div class="box evaluation" data-date="2026-05-20">
Evaluation
<span class="date">20 May 2026</span>
</div>
<div class="arrow">⬇</div><div class="box result" data-date="2026-05-25">
Result
<span class="date">25 May 2026</span>
</div>
<div class="arrow">⬇</div><div class="box promotion" data-date="2026-06-01">
Promotion
<span class="date">01 June 2026</span>
</div></div><script>
let today = new Date().toISOString().split('T')[0];

document.querySelectorAll('.box').forEach(box=>{
  let boxDate = box.getAttribute('data-date');
  if(today > boxDate){
    box.classList.add('disabled');
  }
});
</script></body>
</html>
