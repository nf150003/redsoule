<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
  color:#0f172a;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.btn{
  padding:25px;
  border:none;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  transition:0.3s;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.btn:hover{
  transform:translateY(-4px);
}

.physics{background:#2563eb;}
.chemistry{background:#dc2626;}
.biology{background:#16a34a;}
.math{background:#9333ea;}
.english{background:#ea580c;}
.bangla{background:#0891b2;}
.ict{background:#0f766e;}
.accounting{background:#be123c;}
.finance{background:#7c3aed;}
.library{background:#374151;}

</style>
</head>

<body>

<h1>School Dashboard</h1>

<div class="container">

<button class="btn physics"
onclick="openSheet('https://docs.google.com/spreadsheets/d/1eVfzUfSB1W00rZz-xEXkSUHj3dr511BhSK6mMB8yS7o/edit?gid=0#gid=0')">
Physics
</button>

<button class="btn chemistry"
onclick="openSheet('YOUR_LINK_2')">
Chemistry
</button>

<button class="btn biology"
onclick="openSheet('YOUR_LINK_3')">
Biology
</button>

<button class="btn math"
onclick="openSheet('YOUR_LINK_4')">
Math
</button>

<button class="btn english"
onclick="openSheet('YOUR_LINK_5')">
English
</button>

<button class="btn bangla"
onclick="openSheet('YOUR_LINK_6')">
Bangla
</button>

<button class="btn ict"
onclick="openSheet('YOUR_LINK_7')">
ICT
</button>

<button class="btn accounting"
onclick="openSheet('YOUR_LINK_8')">
Accounting
</button>

<button class="btn finance"
onclick="openSheet('YOUR_LINK_9')">
Finance
</button>

<button class="btn library"
onclick="openSheet('YOUR_LINK_10')">
Library
</button>

</div>

<script>
function openSheet(link){
  window.open(link, "_blank");
}
</script>

</body>
</html>
