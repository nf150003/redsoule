<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>10 Button Script Panel</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background: #f4f6f8;
    }

    h2 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      width: 300px;
      margin: auto;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0d6efd;
      color: white;
    }

    button:hover {
      background: #084298;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>

  <h2>10 Script Buttons</h2>

  <div class="grid">
    <button onclick="runScript(1)">Button 1</button>
    <button onclick="runScript(2)">Button 2</button>
    <button onclick="runScript(3)">Button 3</button>
    <button onclick="runScript(4)">Button 4</button>
    <button onclick="runScript(5)">Button 5</button>
    <button onclick="runScript(6)">Button 6</button>
    <button onclick="runScript(7)">Button 7</button>
    <button onclick="runScript(8)">Button 8</button>
    <button onclick="runScript(9)">Button 9</button>
    <button onclick="runScript(10)">Button 10</button>
  </div>

  <div id="status"></div>

  <script>
    function runScript(id) {
      const status = document.getElementById("status");
      status.innerText = "Running Button " + id + "...";

      fetch("https://script.google.com/macros/s/AKfycbyDlC-668oNqrnLGSzwAhQ3lTTmIZqT2YP24WJ43X8CJtPI7_7cDo9csIUL5FnUjF7TCQ/exec?button=" + id, {
        method: "GET",
        mode: "no-cors"
      })
      .then(() => {
        status.innerText = "Button " + id + " sent ✔";
      })
      .catch(() => {
        status.innerText = "Error ❌";
      });
    }
  </script>

</body>
</html>
