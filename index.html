<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4f7fb;
}

/* HEADER */
.header{
  background:#2563eb;
  color:white;
  text-align:center;
  padding:18px;
  font-size:18px;
  font-weight:600;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* BUTTON */
.btn{
  background:#ffffff;
  border:none;
  border-radius:14px;
  padding:18px 10px;
  font-size:13px;
  font-weight:500;
  color:#1f2937;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.06);
  cursor:pointer;
  transition:0.2s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

.btn:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

/* ICON */
.icon{
  width:45px;
  height:45px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  margin-bottom:8px;
}

/* COLORS */
.c1{background:#ef4444;}
.c2{background:#3b82f6;}
.c3{background:#10b981;}
.c4{background:#f59e0b;}
.c5{background:#8b5cf6;}
.c6{background:#14b8a6;}
.c7{background:#f97316;}
.c8{background:#6366f1;}
.c9{background:#ec4899;}
.c10{background:#0ea5e9;}

a{
  text-decoration:none;
}

</style>
</head>

<body>

<div class="header">
  🎓 Sajib's Dashboard
</div>

<div class="container">

  <div class="grid">

    <!-- CT REPORT BUTTON -->
    <a class="btn" href="#" onclick="sendReport(event)">
      <div class="icon c1">📊</div>
      Send Report
    </a>

    <!-- LEADERBOARD -->
    <a class="btn" href="https://docs.google.com/spreadsheets/d/1eVfzUfSB1W00rZz-xEXkSUHj3dr511BhSK6mMB8yS7o/edit?gid=0#gid=0">
      <div class="icon c2">🏆</div>
      Leaderboard
    </a>

    <a class="btn" href="#">
      <div class="icon c3">📚</div>
      Courses
    </a>

    <a class="btn" href="#">
      <div class="icon c4">🧾</div>
      Assignments
    </a>

    <a class="btn" href="#">
      <div class="icon c5">📝</div>
      Exams
    </a>

    <a class="btn" href="#">
      <div class="icon c6">📄</div>
      Results
    </a>

    <a class="btn" href="#">
      <div class="icon c7">📌</div>
      Notices
    </a>

    <a class="btn" href="#">
      <div class="icon c8">⚙️</div>
      Settings
    </a>

    <a class="btn" href="#">
      <div class="icon c9">👨‍🏫</div>
      Teachers
    </a>

    <a class="btn" href="#">
      <div class="icon c10">📱</div>
      App Info
    </a>

  </div>

</div>

<!-- SCRIPT MOVED OUTSIDE GRID (FIXED) -->
<script>

function sendReport(e) {
  e.preventDefault();

  const url = "YOUR_APPS_SCRIPT_WEBAPP_URL";

  if (!url || url === "YOUR_APPS_SCRIPT_WEBAPP_URL") {
    alert("❌ WebApp URL not set!");
    return;
  }

  fetch(url)
    .then(res => res.text())
    .then(data => {

      if (data.trim() === "SUCCESS") {

        alert("✔ Mail Sent Successfully");

        window.location.href = "https://nf150003.github.io/redsoule/";

      } else {
        alert("❌ Failed: " + data);
      }

    })
    .catch(err => {
      alert("Error: " + err);
    });

}

</script>

</body>
</html>
