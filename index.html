<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Run Google Script</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 120px;
      background: #f5f5f5;
    }

    h2 {
      color: #333;
    }

    button {
      padding: 15px 35px;
      font-size: 18px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #084298;
    }

    #status {
      margin-top: 20px;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>

<body>

  <h2>Google Apps Script Trigger</h2>

  <button onclick="runScript()">Execute</button>

  <div id="status"></div>

  <script>
    function runScript() {
      const status = document.getElementById("status");
      status.innerText = "Running script...";

      fetch("https://script.google.com/macros/s/AKfycbyDlC-668oNqrnLGSzwAhQ3lTTmIZqT2YP24WJ43X8CJtPI7_7cDo9csIUL5FnUjF7TCQ/exec", {
        method: "GET",
        mode: "no-cors"
      })
      .then(() => {
        status.innerText = "Request sent ✔ (Check Google Script)";
      })
      .catch(() => {
        status.innerText = "Error ❌";
      });
    }
  </script>

</body>
</html>
