<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Plan Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef2ff,#ffffff,#f3f7ff);
    min-height:100vh;
    padding:20px;
    color:#333;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:34px;
    color:#4a4a4a;
    margin-bottom:8px;
}

.header p{
    color:#777;
    font-size:15px;
}

.card{
    background:#fff;
    border-radius:28px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.07);
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full-width{
    grid-column:1/-1;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#555;
}

select,
textarea{
    width:100%;
    border:none;
    outline:none;
    background:#f5f7ff;
    border-radius:18px;
    padding:16px;
    font-size:15px;
    transition:0.3s;
}

select:focus,
textarea:focus{
    background:#edf2ff;
    transform:scale(1.01);
}

textarea{
    height:150px;
    resize:none;
}

.button-group{
    display:flex;
    gap:12px;
    margin-top:10px;
}

button{
    border:none;
    border-radius:16px;
    padding:14px 20px;
    cursor:pointer;
    font-weight:600;
    font-size:15px;
    transition:0.3s;
}

.save-btn{
    flex:1;
    background:linear-gradient(135deg,#74ebd5,#9face6);
    color:white;
}

.clear-btn{
    background:#f1f3f9;
    color:#444;
}

.save-btn:hover,
.clear-btn:hover{
    transform:translateY(-2px);
}

.status{
    margin-top:15px;
    text-align:center;
    font-weight:500;
    color:#444;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
}

th{
    background:#eef3ff;
    color:#444;
    padding:16px;
    text-align:left;
    font-size:15px;
}

td{
    padding:16px;
    border-bottom:1px solid #eee;
    vertical-align:top;
    font-size:14px;
}

tr:hover{
    background:#fafcff;
}

.action-buttons{
    display:flex;
    gap:8px;
}

.edit-btn{
    background:#ffd54f;
    color:#444;
    padding:10px 16px;
}

.delete-btn{
    background:#ef5350;
    color:white;
    padding:10px 16px;
}

.badge{
    display:inline-block;
    padding:8px 14px;
    border-radius:30px;
    background:#edf2ff;
    color:#555;
    font-size:13px;
    font-weight:600;
}

.empty{
    text-align:center;
    padding:30px;
    color:#888;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#999;
    font-size:13px;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .button-group{
        flex-direction:column;
    }

    .header h1{
        font-size:28px;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Lesson Plan Manager</h1>
        <p>Create, edit and manage lesson plans beautifully.</p>
    </div>

    <div class="card">

        <input type="hidden" id="rowNumber">

        <div class="form-grid">

            <div>
                <label>Subject</label>

                <select id="subject">
                    <option>Loading Subjects...</option>
                </select>
            </div>

            <div>
                <label>Status</label>
                <div class="badge">Ready</div>
            </div>

            <div class="full-width">
                <label>Lesson Plan</label>

                <textarea
                id="lessonPlan"
                placeholder="Write detailed lesson plan here..."></textarea>
            </div>

        </div>

        <div class="button-group">

            <button class="save-btn" onclick="saveLessonPlan()">
                Save Lesson Plan
            </button>

            <button class="clear-btn" onclick="clearForm()">
                Clear Form
            </button>

        </div>

        <div class="status" id="status"></div>

    </div>


    <div class="card">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">

            <h2 style="color:#444;">Submitted Lesson Plans</h2>

            <button class="clear-btn" onclick="loadLessonPlans()">
                Refresh
            </button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>
                        <th>Subject</th>
                        <th>Lesson Plan</th>
                        <th width="180">Action</th>
                    </tr>

                </thead>

                <tbody id="lessonTable">

                    <tr>
                        <td colspan="3" class="empty">
                            Loading lesson plans...
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="footer">
        Lesson Plan System • GitHub Pages + Google Sheets
    </div>

</div>


<script>

// ======================================
// PASTE YOUR GOOGLE APPS SCRIPT URL
// ======================================

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzUVnC6nBfLWr2TdA0WYCdewrni8Zyc1H6FUZrFfGV-cfr1oAPkQPwelzLlqRlaXJxN/exec";



// LOAD SUBJECTS
async function loadSubjects(){

    try{

        const response = await fetch(
            WEB_APP_URL + "?action=getSubjects"
        );

        const data = await response.json();

        const dropdown =
        document.getElementById("subject");

        dropdown.innerHTML =
        '<option value="">Select Subject</option>';

        data.forEach(subject=>{

            dropdown.innerHTML += `
                <option value="${subject}">
                    ${subject}
                </option>
            `;

        });

    }catch(error){

        document.getElementById("status").innerHTML =
        "Failed to load subjects.";

    }

}



// LOAD LESSON PLANS
async function loadLessonPlans(){

    try{

        const response = await fetch(
            WEB_APP_URL + "?action=getLessonPlans"
        );

        const data = await response.json();

        const table =
        document.getElementById("lessonTable");

        table.innerHTML = "";

        if(data.length === 0){

            table.innerHTML = `
                <tr>
                    <td colspan="3" class="empty">
                        No lesson plans found.
                    </td>
                </tr>
            `;

            return;
        }

        data.forEach(item=>{

            table.innerHTML += `

            <tr>

                <td>
                    <div class="badge">
                        ${item.subject}
                    </div>
                </td>

                <td>
                    ${item.lessonPlan}
                </td>

                <td>

                    <div class="action-buttons">

                        <button
                        class="edit-btn"
                        onclick='editLesson(
                            "${item.row}",
                            ${JSON.stringify(item.subject)},
                            ${JSON.stringify(item.lessonPlan)}
                        )'>
                        Edit
                        </button>

                        <button
                        class="delete-btn"
                        onclick='deleteLesson("${item.row}")'>
                        Delete
                        </button>

                    </div>

                </td>

            </tr>

            `;

        });

    }catch(error){

        document.getElementById("lessonTable").innerHTML = `
            <tr>
                <td colspan="3" class="empty">
                    Failed to load lesson plans.
                </td>
            </tr>
        `;

    }

}



// SAVE OR UPDATE
async function saveLessonPlan(){

    const row =
    document.getElementById("rowNumber").value;

    const subject =
    document.getElementById("subject").value;

    const lessonPlan =
    document.getElementById("lessonPlan").value;

    if(subject === "" || lessonPlan === ""){

        document.getElementById("status").innerHTML =
        "Please fill all fields.";

        return;
    }

    const formData = new FormData();

    formData.append("action","saveLesson");

    formData.append("row",row);

    formData.append("subject",subject);

    formData.append("lessonPlan",lessonPlan);

    try{

        const response = await fetch(
            WEB_APP_URL,
            {
                method:"POST",
                body:formData
            }
        );

        const result = await response.text();

        document.getElementById("status").innerHTML =
        result;

        clearForm();

        loadLessonPlans();

    }catch(error){

        document.getElementById("status").innerHTML =
        "Error saving lesson plan.";

    }

}



// EDIT
function editLesson(row,subject,lessonPlan){

    document.getElementById("rowNumber").value =
    row;

    document.getElementById("subject").value =
    subject;

    document.getElementById("lessonPlan").value =
    lessonPlan;

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

    document.getElementById("status").innerHTML =
    "Editing lesson plan...";

}



// DELETE
async function deleteLesson(row){

    const confirmDelete =
    confirm("Delete this lesson plan?");

    if(!confirmDelete){
        return;
    }

    const formData = new FormData();

    formData.append("action","deleteLesson");

    formData.append("row",row);

    try{

        const response = await fetch(
            WEB_APP_URL,
            {
                method:"POST",
                body:formData
            }
        );

        const result = await response.text();

        document.getElementById("status").innerHTML =
        result;

        loadLessonPlans();

    }catch(error){

        document.getElementById("status").innerHTML =
        "Delete failed.";

    }

}



// CLEAR FORM
function clearForm(){

    document.getElementById("rowNumber").value = "";

    document.getElementById("subject").value = "";

    document.getElementById("lessonPlan").value = "";

}



// INITIAL LOAD
loadSubjects();

loadLessonPlans();

</script>

</body>
</html>
