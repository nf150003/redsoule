<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Plan Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#e3f2fd,#ffffff);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin-bottom:25px;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:600;
    margin-bottom:20px;
    color:#444;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
    color:#555;
}

select,
textarea{
    width:100%;
    border:none;
    outline:none;
    background:#f5f7fb;
    border-radius:15px;
    padding:15px;
    font-size:15px;
}

textarea{
    height:130px;
    resize:none;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.save-btn{
    width:100%;
    background:linear-gradient(135deg,#74ebd5,#9face6);
    color:white;
}

.save-btn:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#eef3ff;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #eee;
    vertical-align:top;
}

.edit-btn{
    background:#ffd54f;
}

.delete-btn{
    background:#ef5350;
    color:white;
    margin-left:5px;
}

#status{
    margin-top:15px;
    text-align:center;
    color:#444;
}

@media(max-width:700px){

    table,
    thead,
    tbody,
    tr,
    td,
    th{
        display:block;
    }

    tr{
        margin-bottom:15px;
        background:#fafafa;
        border-radius:15px;
        padding:10px;
    }

    th{
        display:none;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="title">Lesson Plan Manager</div>

        <input type="hidden" id="rowNumber">

        <div class="input-group">
            <label>Subject</label>
            <select id="subject">
                <option>Loading...</option>
            </select>
        </div>

        <div class="input-group">
            <label>Lesson Plan</label>
            <textarea id="lessonPlan"></textarea>
        </div>

        <button class="save-btn" onclick="saveLessonPlan()">
            Save Lesson Plan
        </button>

        <div id="status"></div>

    </div>

    <div class="card">

        <div class="title">Submitted Lesson Plans</div>

        <table>

            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Lesson Plan</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="lessonTable"></tbody>

        </table>

    </div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzUVnC6nBfLWr2TdA0WYCdewrni8Zyc1H6FUZrFfGV-cfr1oAPkQPwelzLlqRlaXJxN/exec";


// LOAD SUBJECTS
async function loadSubjects(){

    const response = await fetch(WEB_APP_URL + "?action=getSubjects");
    const data = await response.json();

    const dropdown = document.getElementById("subject");

    dropdown.innerHTML = '<option value="">Select Subject</option>';

    data.forEach(subject=>{

        dropdown.innerHTML += `
            <option value="${subject}">
                ${subject}
            </option>
        `;

    });

}


// LOAD LESSON PLANS
async function loadLessonPlans(){

    const response = await fetch(WEB_APP_URL + "?action=getLessonPlans");

    const data = await response.json();

    const table = document.getElementById("lessonTable");

    table.innerHTML = "";

    data.forEach(item=>{

        table.innerHTML += `

        <tr>

            <td>${item.subject}</td>

            <td>${item.lessonPlan}</td>

            <td>

                <button class="edit-btn"
                onclick="editLesson(
                    '${item.row}',
                    \`${item.subject}\`,
                    \`${item.lessonPlan}\`
                )">
                Edit
                </button>

                <button class="delete-btn"
                onclick="deleteLesson('${item.row}')">
                Delete
                </button>

            </td>

        </tr>

        `;

    });

}


// SAVE OR UPDATE
async function saveLessonPlan(){

    const row = document.getElementById("rowNumber").value;

    const subject = document.getElementById("subject").value;

    const lessonPlan = document.getElementById("lessonPlan").value;

    if(subject==="" || lessonPlan===""){
        alert("Fill all fields");
        return;
    }

    const formData = new FormData();

    formData.append("action","saveLesson");

    formData.append("row",row);

    formData.append("subject",subject);

    formData.append("lessonPlan",lessonPlan);

    const response = await fetch(WEB_APP_URL,{
        method:"POST",
        body:formData
    });

    const result = await response.text();

    document.getElementById("status").innerHTML = result;

    document.getElementById("rowNumber").value = "";

    document.getElementById("lessonPlan").value = "";

    loadLessonPlans();

}


// EDIT
function editLesson(row,subject,lessonPlan){

    document.getElementById("rowNumber").value = row;

    document.getElementById("subject").value = subject;

    document.getElementById("lessonPlan").value = lessonPlan;

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}


// DELETE
async function deleteLesson(row){

    if(!confirm("Delete this lesson plan?")){
        return;
    }

    const formData = new FormData();

    formData.append("action","deleteLesson");

    formData.append("row",row);

    const response = await fetch(WEB_APP_URL,{
        method:"POST",
        body:formData
    });

    const result = await response.text();

    document.getElementById("status").innerHTML = result;

    loadLessonPlans();

}


loadSubjects();

loadLessonPlans();

</script>

</body>
</html>
