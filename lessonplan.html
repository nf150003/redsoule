<style>

/* =======================
   GLOBAL STYLE
======================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#f9fbff,#ffffff,#f4f7ff);
    min-height:100vh;
    color:#2c3e50;
}

/* =======================
   TOP HEADER
======================= */
.topbar{
    background:linear-gradient(135deg,#6c7ce0,#8e9fff);
    color:white;
    padding:18px;
    text-align:center;
}

.topbar h1{
    font-size:20px;
    letter-spacing:1px;
}

.topbar p{
    font-size:12px;
    opacity:0.9;
}

/* =======================
   CONTAINER
======================= */
.container{
    max-width:1050px;
    margin:auto;
    padding:20px;
}

/* =======================
   CARD
======================= */
.card{
    background:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    border:1px solid #eef2ff;
}

/* =======================
   FORM ELEMENTS
======================= */
label{
    display:block;
    margin-top:10px;
    font-size:13px;
    font-weight:500;
    color:#4a5568;
}

select, textarea{
    width:100%;
    margin-top:6px;
    padding:12px;
    border-radius:12px;
    border:1px solid #e6eaf5;
    outline:none;
    background:#f9fbff;
    font-size:14px;
}

textarea{
    height:140px;
    resize:none;
}

/* =======================
   BUTTONS
======================= */
button{
    border:none;
    border-radius:10px;
    padding:12px 14px;
    cursor:pointer;
    font-weight:500;
    font-size:14px;
}

.btn-save{
    width:100%;
    margin-top:12px;
    background:#7d8cff;
    color:white;
}

.btn-save:hover{
    background:#6a78ff;
}

.btn-clear{
    width:100%;
    margin-top:8px;
    background:#f1f3f9;
    color:#333;
}

/* =======================
   STATUS
======================= */
.status{
    text-align:center;
    margin-top:10px;
    font-size:13px;
    color:#666;
}

/* =======================
   TABLE
======================= */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f3f6ff;
    padding:12px;
    text-align:left;
    font-size:13px;
    color:#3b4a6b;
}

td{
    padding:12px;
    border-bottom:1px solid #f0f3fa;
    font-size:13px;
}

tr:hover{
    background:#f9fbff;
}

/* =======================
   ACTION BUTTONS
======================= */
.action{
    display:flex;
    gap:6px;
}

.edit{
    background:#ffeaa7;
    font-size:12px;
    padding:8px 10px;
}

.delete{
    background:#ff7675;
    color:white;
    font-size:12px;
    padding:8px 10px;
}

/* =======================
   FOOTER
======================= */
.footer{
    text-align:center;
    padding:15px;
    font-size:12px;
    color:#9aa4b2;
}

</style>
