<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Lesson Plan System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =======================
   GLOBAL STYLE
======================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#f7f9ff,#ffffff,#eef3ff);
    min-height:100vh;
    color:#2c3e50;
}

/* =======================
   TOP HEADER
======================= */
.topbar{
    background:linear-gradient(135deg,#2c3e50,#34495e);
    color:white;
    padding:18px;
    text-align:center;
}

.topbar h1{
    font-size:20px;
    letter-spacing:1px;
}

.topbar p{
    font-size:12px;
    opacity:0.8;
}

/* =======================
   CONTAINER
======================= */
.container{
    max-width:1050px;
    margin:auto;
    padding:20px;
}

/* =======================
   CARD
======================= */
.card{
    background:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    border:1px solid #eef2f7;
}

/* =======================
   FORM ELEMENTS
======================= */
label{
    display:block;
    margin-top:10px;
    font-size:13px;
    font-weight:500;
    color:#555;
}

select, textarea{
    width:100%;
    margin-top:6px;
    padding:12px;
    border-radius:12px;
    border:1px solid #e1e6f0;
    outline:none;
    background:#f9fbff;
    font-size:14px;
}

textarea{
    height:140px;
    resize:none;
}

/* =======================
   BUTTONS
======================= */
button{
    border:none;
    border-radius:10px;
    padding:12px 14px;
    cursor:pointer;
    font-weight:500;
    font-size:14px;
}

.btn-save{
    width:100%;
    margin-top:12px;
    background:#4a69bd;
    color:white;
}

.btn-save:hover{
    background:#3b5998;
}

.btn-clear{
    width:100%;
    margin-top:8px;
    background:#ecf0f1;
}

/* =======================
   STATUS
======================= */
.status{
    text-align:center;
    margin-top:10px;
    font-size:13px;
    color:#555;
}

/* =======================
   TABLE
======================= */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#eef3ff;
    padding:12px;
    text-align:left;
    font-size:13px;
    color:#34495e;
}

td{
    padding:12px;
    border-bottom:1px solid #f0f2f7;
    font-size:13px;
}

tr:hover{
    background:#fafcff;
}

/* =======================
   ACTION BUTTONS
======================= */
.action{
    display:flex;
    gap:6px;
}

.edit{
    background:#ffeaa7;
    font-size:12px;
    padding:8px 10px;
}

.delete{
    background:#ff7675;
    color:white;
    font-size:12px;
    padding:8px 10px;
}

/* =======================
   FOOTER
======================= */
.footer{
    text-align:center;
    padding:15px;
    font-size:12px;
    color:#95a5a6;
}

</style>
</head>

<body>

<!-- =======================
     HEADER
======================= -->
<div class="topbar">
    <h1>National College & School</h1>
    <p>Official Academic Lesson Plan Management System</p>
</div>

<div class="container">

    <!-- =======================
         FORM CARD
    ======================= -->
    <div class="card">

        <input type="hidden" id="row">

        <label>Subject</label>
        <select id="subject">
            <option>Loading...</option>
        </select>

        <label>Lesson Plan</label>
        <textarea id="lesson"></textarea>

        <button class="btn-save" onclick="save()">Save Lesson Plan</button>
        <button class="btn-clear" onclick="clearForm()">Clear</button>

        <div class="status" id="status"></div>

    </div>

    <!-- =======================
         TABLE CARD
    ======================= -->
    <div class="card">

        <h3 style="margin-bottom:10px;">Submitted Lesson Plans</h3>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Lesson Plan</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="table"></tbody>
        </table>

    </div>

</div>

<div class="footer">
    © Academic Management System • College Edition
</div>

<!-- =======================
     SCRIPT
======================= -->
<script>

const URL = "https://script.google.com/macros/s/AKfycbzUVnC6nBfLWr2TdA0WYCdewrni8Zyc1H6FUZrFfGV-cfr1oAPkQPwelzLlqRlaXJxN/exec";

// LOAD SUBJECTS
async function loadSubjects(){
    try{
        const res = await fetch(URL+"?action=getSubjects");
        const data = await res.json();

        const select = document.getElementById("subject");
        select.innerHTML = `<option value="">Select Subject</option>`;

        data.forEach(s=>{
            select.innerHTML += `<option value="${s}">${s}</option>`;
        });

    }catch(e){
        document.getElementById("status").innerText = "Failed to load subjects";
    }
}

// LOAD LESSONS
async function loadLessons(){
    try{
        const res = await fetch(URL+"?action=getLessonPlans");
        const data = await res.json();

        const table = document.getElementById("table");
        table.innerHTML = "";

        data.forEach(item=>{
            table.innerHTML += `
            <tr>
                <td>${item.subject}</td>
                <td>${item.lessonPlan}</td>
                <td>
                    <div class="action">
                        <button class="edit"
                        onclick='edit(${item.row},${JSON.stringify(item.subject)},${JSON.stringify(item.lessonPlan)})'>
                        Edit
                        </button>

                        <button class="delete" onclick="del(${item.row})">
                        Delete
                        </button>
                    </div>
                </td>
            </tr>`;
        });

    }catch(e){
        document.getElementById("table").innerHTML =
        "<tr><td colspan='3'>Load failed</td></tr>";
    }
}

// SAVE
async function save(){
    const row = document.getElementById("row").value;
    const subject = document.getElementById("subject").value;
    const lesson = document.getElementById("lesson").value;

    if(!subject || !lesson){
        document.getElementById("status").innerText = "Fill all fields";
        return;
    }

    const form = new FormData();
    form.append("action","saveLesson");
    form.append("row",row);
    form.append("subject",subject);
    form.append("lessonPlan",lesson);

    const res = await fetch(URL,{method:"POST",body:form});
    document.getElementById("status").innerText = await res.text();

    clearForm();
    loadLessons();
}

// EDIT
function edit(row,sub,plan){
    document.getElementById("row").value = row;
    document.getElementById("subject").value = sub;
    document.getElementById("lesson").value = plan;
}

// DELETE
async function del(row){
    if(!confirm("Delete this record?")) return;

    const form = new FormData();
    form.append("action","deleteLesson");
    form.append("row",row);

    const res = await fetch(URL,{method:"POST",body:form});

    document.getElementById("status").innerText = await res.text();

    loadLessons();
}

// CLEAR
function clearForm(){
    document.getElementById("row").value="";
    document.getElementById("subject").value="";
    document.getElementById("lesson").value="";
}

// INIT
loadSubjects();
loadLessons();

</script>

</body>
</html>
