<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Plan Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#f7f9ff,#ffffff,#f2f6ff);
    min-height:100vh;
    padding:22px;
    color:#2f3640;
}

/* CONTAINER */
.container{
    max-width:1050px;
    margin:auto;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
    color:#2c3e50;
    font-weight:600;
}

.header p{
    color:#7f8c8d;
    font-size:14px;
    margin-top:6px;
}

/* CARD */
.card{
    background:#ffffff;
    border-radius:22px;
    padding:22px;
    margin-bottom:22px;
    box-shadow:0 8px 22px rgba(0,0,0,0.05);
    border:1px solid #eef2f7;
}

/* FORM GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.full-width{
    grid-column:1/-1;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    color:#4b4b4b;
    font-size:14px;
}

/* INPUTS */
select,
textarea{
    width:100%;
    border:1px solid #e6eaf0;
    outline:none;
    background:#f9fbff;
    border-radius:14px;
    padding:14px;
    font-size:14px;
    transition:0.2s;
    color:#2c3e50;
}

select:focus,
textarea:focus{
    border-color:#a8c5ff;
    background:#ffffff;
}

textarea{
    height:140px;
    resize:none;
}

/* STATUS BADGE */
.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    background:#eef3ff;
    color:#4a69bd;
    font-size:12px;
    font-weight:500;
}

/* BUTTONS */
.button-group{
    display:flex;
    gap:10px;
    margin-top:12px;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 16px;
    cursor:pointer;
    font-weight:500;
    font-size:14px;
    transition:0.2s;
}

.save-btn{
    flex:1;
    background:#4a69bd;
    color:white;
}

.save-btn:hover{
    background:#3b5998;
}

.clear-btn{
    background:#f1f3f6;
    color:#333;
}

.clear-btn:hover{
    background:#e4e9f2;
}

/* STATUS */
.status{
    margin-top:12px;
    text-align:center;
    font-size:13px;
    color:#555;
}

/* TABLE */
.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
}

th{
    background:#f3f6ff;
    color:#3b4a66;
    padding:14px;
    text-align:left;
    font-size:14px;
    font-weight:600;
}

td{
    padding:14px;
    border-bottom:1px solid #f0f2f7;
    font-size:13px;
    color:#2f3640;
}

tr:hover{
    background:#fafcff;
}

/* ACTION BUTTONS */
.action-buttons{
    display:flex;
    gap:8px;
}

.edit-btn{
    background:#ffeaa7;
    color:#2d3436;
    padding:8px 12px;
    border-radius:10px;
    font-size:12px;
}

.delete-btn{
    background:#ff7675;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    font-size:12px;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:25px;
    color:#888;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:18px;
    color:#95a5a6;
    font-size:12px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .button-group{
        flex-direction:column;
    }

    .header h1{
        font-size:26px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Lesson Plan Manager</h1>
        <p>Professional academic planning system</p>
    </div>

    <div class="card">

        <input type="hidden" id="rowNumber">

        <div class="form-grid">

            <div>
                <label>Subject</label>
                <select id="subject">
                    <option>Loading...</option>
                </select>
            </div>

            <div>
                <label>Status</label>
                <div class="badge">Ready</div>
            </div>

            <div class="full-width">
                <label>Lesson Plan</label>
                <textarea id="lessonPlan" placeholder="Write lesson plan..."></textarea>
            </div>

        </div>

        <div class="button-group">
            <button class="save-btn" onclick="saveLessonPlan()">Save Lesson Plan</button>
            <button class="clear-btn" onclick="clearForm()">Clear</button>
        </div>

        <div class="status" id="status"></div>

    </div>

    <div class="card">

        <h2 style="font-size:18px;color:#2c3e50;margin-bottom:12px;">
            Saved Lesson Plans
        </h2>

        <div class="table-wrapper">

            <table>

                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Lesson Plan</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="lessonTable">
                    <tr>
                        <td colspan="3" class="empty">Loading...</td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

    <div class="footer">
        Academic Management System • Soft UI Edition
    </div>

</div>

</body>
</html>
